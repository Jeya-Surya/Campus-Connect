<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Campus Connect — Student Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header class="app-header">
    <h1>🎓 Campus Connect — Student Dashboard</h1>

    <div class="header-actions">
        <button class="header-btn" onclick="goMentorship()">🤝 Mentorship</button>
        <button class="header-btn" onclick="logout()">🚪 Logout</button>
        <button class="header-btn" id="themeToggle">🌙 Light Mode</button>
    </div>
</header>

<main class="container">

    <section class="post-form">
        <h3>📨 My Mentorship Requests</h3>
        <div id="requestList">Loading...</div>
    </section>

</main>

<footer class="footer">
    <p>© 2025 Campus Connect | Student Mentorship Dashboard</p>
</footer>

<script src="student-dashboard.js"></script>

<script>
    function logout() {
      localStorage.removeItem("user");
      window.location.href = "login.html";
    }

    function goMentorship() {
      window.location.href = "mentorship.html";
    }

    // Dark mode sync
    const toggleBtn = document.getElementById("themeToggle");
    const isDark = localStorage.getItem("darkTheme") === "true";

    if (isDark) {
      document.body.classList.add("dark-theme");
      toggleBtn.textContent = "☀️ Light Mode";
    }

    toggleBtn.addEventListener("click", () => {
      document.body.classList.toggle("dark-theme");
      localStorage.setItem("darkTheme",
        document.body.classList.contains("dark-theme"));
      toggleBtn.textContent =
        document.body.classList.contains("dark-theme")
          ? "☀️ Light Mode"
          : "🌙 Light Mode";
    });
</script>

</body>
</html>
