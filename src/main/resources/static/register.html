<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Campus Connect — Register</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="app-header">
    <h1>🎓 Campus Connect — Register</h1>

    <div class="header-actions">
        <button class="header-btn" id="themeToggle">🌙 Light Mode</button>
    </div>
</header>

<main class="container">
    <section class="post-form">
        <h2>Create an Account</h2>
        <input id="name" placeholder="Full Name" />
        <input id="email" type="email" placeholder="Email" />
        <input id="password" type="password" placeholder="Password" />
        <button id="registerBtn" type="button">🚀 Register</button>

        <p style="margin-top:15px;text-align:center;">
            Already have an account?
            <a href="login.html" style="color:var(--accent-color);font-weight:600;">Login</a>
        </p>
    </section>
</main>

<footer class="footer">
    <p>© 2025 Campus Connect | Join the community</p>
</footer>

<script>
    const toggleBtn = document.getElementById("themeToggle");
    const isDark = localStorage.getItem("darkTheme") === "true";
    if (isDark) {
      document.body.classList.add("dark-theme");
      toggleBtn.textContent = "☀️ Light Mode";
    }
    toggleBtn.addEventListener("click", () => {
      document.body.classList.toggle("dark-theme");
      const darkEnabled = document.body.classList.contains("dark-theme");
      localStorage.setItem("darkTheme", darkEnabled);
      toggleBtn.textContent = darkEnabled ? "☀️ Light Mode" : "🌙 Dark Mode";
    });

    // Registration API call
    const API_BASE = 'http://localhost:8080/api';
    document.getElementById("registerBtn").addEventListener("click", async () => {
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!name || !email || !password) return alert("Fill all fields");

      const res = await fetch(`${API_BASE}/users/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });

      if (res.ok) {
        alert("Registration successful! Please login.");
        window.location.href = "login.html";
      } else {
        alert("Error creating account");
      }
    });
</script>
</body>
</html>
