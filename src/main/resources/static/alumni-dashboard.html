<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Campus Connect — Alumni Dashboard</title>

    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        .section-title {
          text-align: center;
          margin: 30px 0 15px;
        }

        .request-list {
          max-width: 900px;
          margin: auto;
          display: grid;
          gap: 20px;
        }

        .request-card {
          background: #ffffff;
          padding: 20px;
          border-radius: 14px;
          box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        body.dark-theme .request-card {
          background: #1f1f1f;
        }

        .request-card p {
          margin: 6px 0;
          color: #6c757d;
        }

        body.dark-theme .request-card p {
          color: #bdbdbd;
        }

        .actions {
          margin-top: 12px;
          display: flex;
          gap: 10px;
        }

        .btn {
          border: none;
          padding: 8px 14px;
          border-radius: 8px;
          cursor: pointer;
          font-weight: 600;
        }

        .accept { background: #22c55e; color: #fff; }
        .reject { background: #ef4444; color: #fff; }
        .chat   { background: #2563eb; color: #fff; }
    </style>
</head>

<body>

<header class="app-header">
    <h1>🎓 Alumni Mentorship Dashboard</h1>
    <div class="header-actions">
        <button class="header-btn" onclick="logout()">🚪 Logout</button>
        <button class="header-btn" id="themeToggle">🌙 Light Mode</button>
    </div>
</header>

<main class="container">

    <h2 class="section-title">⏳ Pending Requests</h2>
    <div id="pendingList" class="request-list"></div>

    <h2 class="section-title">✅ Accepted Mentorships</h2>
    <div id="acceptedList" class="request-list"></div>

</main>

<footer class="footer">
    <p>© 2025 Campus Connect | Alumni Dashboard</p>
</footer>

<script src="api-config.js"></script>
<script src="alumni-dashboard.js"></script>

</body>
</html>
