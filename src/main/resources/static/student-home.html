<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Campus Connect — Student Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        .home-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
          gap: 30px;
          max-width: 900px;
          margin: 60px auto;
        }

        .home-card {
          background: #ffffff;
          padding: 30px;
          border-radius: 18px;
          text-align: center;
          box-shadow: 0 15px 35px rgba(0,0,0,0.12);
          cursor: pointer;
          transition: transform 0.2s;
        }

        .home-card:hover {
          transform: translateY(-5px);
        }

        body.dark-theme .home-card {
          background: #1f1f1f;
        }

        .home-card h3 {
          margin-top: 15px;
        }

        .home-card p {
          color: #6c757d;
        }

        body.dark-theme .home-card p {
          color: #bdbdbd;
        }
    </style>
</head>

<body>

<header class="app-header">
    <h1>🎯 Student Home</h1>
    <div class="header-actions">
        <button class="header-btn" onclick="logout()">🚪 Logout</button>
        <button class="header-btn" id="themeToggle">🌙 Dark Mode</button>
    </div>
</header>

<main class="container">

    <div class="home-grid">

        <div class="home-card" onclick="goMentors()">
            <div style="font-size:42px;">🔍</div>
            <h3>Find Alumni Mentors</h3>
            <p>Browse alumni and request mentorship</p>
        </div>

        <div class="home-card" onclick="goRequests()">
            <div style="font-size:42px;">📄</div>
            <h3>My Requests</h3>
            <p>Track mentorship request status</p>
        </div>

        <!-- ✅ FIXED CHATS CARD -->
        <div class="home-card" onclick="goChats()">
            <div style="font-size:42px;">💬</div>
            <h3>Chats</h3>
            <p>Chat with accepted mentors</p>
        </div>

    </div>

</main>

<footer class="footer">
    <p>© 2025 Campus Connect | Student Portal</p>
</footer>

<script>
    // 🔐 session check
    const session = JSON.parse(localStorage.getItem("user"));
    if (!session || !session.data) {
      alert("Please login first");
      window.location.href = "login.html";
    }

    // 🌙 theme
    const toggleBtn = document.getElementById("themeToggle");
    if (localStorage.getItem("darkTheme") === "true") {
      document.body.classList.add("dark-theme");
    }

    toggleBtn.onclick = () => {
      document.body.classList.toggle("dark-theme");
      localStorage.setItem("darkTheme",
        document.body.classList.contains("dark-theme"));
    };

    // 🔀 navigation
    function goMentors() {
      window.location.href = "student-mentorship.html";
    }

    function goRequests() {
      window.location.href = "student-requests.html";
    }

    // ✅ WHATSAPP-STYLE FLOW
    function goChats() {
      window.location.href = "recent-chats.html";
    }

    function logout() {
      localStorage.clear();
      window.location.href = "login.html";
    }
</script>

</body>
</html>
