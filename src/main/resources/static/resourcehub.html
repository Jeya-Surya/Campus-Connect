<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Resource Hub | Campus Connect</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- 1. INPUT BOX MATCHING BACKGROUNDS --- */
        .modern-input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            /* Matches light mode panel background */
            background: rgba(240, 242, 245, 0.5) !important;
            border: 1px solid var(--border-light);
            font-size: 1rem;
            font-family: inherit;
            color: var(--text-dark);
            transition: all 0.3s ease;
        }

        /* Matches dark mode panel background */
        .dark-theme .modern-input {
            background: rgba(42, 42, 42, 0.6) !important;
            border-color: #333;
            color: #ffffff !important;
        }

        /* Focus state for better visibility when typing */
        .modern-input:focus {
            outline: none;
            background: var(--card-bg) !important;
            border-color: #6c63ff;
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.1);
        }

        /* Special handling for Select visibility */
        select.modern-input option {
            background-color: var(--card-bg) !important;
            color: var(--text-dark) !important;
        }

        /* --- 2. RESOURCE GRID (Horizontal Wrap) --- */
        .resource-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            margin-top: 20px;
        }

        .resource-card {
            background: var(--card-bg, #ffffff);
            border-radius: 20px;
            padding: 25px;
            text-align: left;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 2px solid transparent;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            width: calc(33.333% - 17px);
            min-width: 300px;
        }

        @media (max-width: 992px) {
            .resource-card { width: calc(50% - 13px); }
        }
        @media (max-width: 650px) {
            .resource-card { width: 100%; }
        }

        .resource-card:hover {
            transform: translateY(-8px);
            border-color: #6c63ff;
            box-shadow: 0 15px 40px rgba(108, 99, 255, 0.15);
        }

        /* --- 3. UI COMPONENTS --- */
        .resource-card h4 { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; color: var(--text-dark); }

        .resource-badge {
            display: inline-block; padding: 6px 14px; margin-bottom: 15px; border-radius: 20px;
            font-size: 0.85rem; font-weight: 600; background: #e0e7ff; color: #3730a3; width: fit-content;
        }

        .resource-info {
            background: rgba(108, 99, 255, 0.08);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            border-left: 4px solid #6c63ff;
            color: var(--text-dark);
            flex-grow: 1;
        }

        .btn-download {
            background: linear-gradient(135deg, #6c63ff 0%, #5a52e0 100%);
            color: white; border: none; padding: 12px 25px; border-radius: 12px;
            font-weight: 700; cursor: pointer; transition: all 0.2s ease; width: 100%;
        }

        .rh-panel {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow-subtle);
            border: 1px solid var(--border-light);
            margin-bottom: 30px;
        }

        .rh-form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .rh-full { grid-column: 1 / -1; }

        .rh-btn-muted { background: transparent; color: var(--text-muted); border: 2px solid var(--border-light); padding: 12px 25px; border-radius: 12px; cursor: pointer; }

        /* ===== RESPONSIVE STYLES FOR RESOURCE HUB ===== */
        @media (max-width: 767px) {
            /* Form grid - Single column on mobile */
            .rh-form-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            /* Panel padding */
            .rh-panel {
                padding: 20px;
                margin-bottom: 20px;
            }

            /* Resource card - Already responsive from existing @media */
            .resource-card {
                padding: 18px;
                min-width: auto;
            }

            .resource-card h4 {
                font-size: 1.15rem;
            }

            /* Buttons */
            .btn-download,
            .rh-btn-muted {
                padding: 10px 20px;
                font-size: 0.95rem;
            }

            /* Inputs - Better touch targets */
            .modern-input {
                padding: 12px;
                font-size: 16px; /* Prevents zoom on iOS */
            }
        }

        @media (max-width: 480px) {
            .rh-panel {
                padding: 16px;
                border-radius: 16px;
            }

            .resource-card {
                padding: 16px;
                border-radius: 16px;
            }

            .resource-card h4 {
                font-size: 1.1rem;
            }

            .resource-badge {
                font-size: 0.8rem;
                padding: 5px 12px;
            }

            .btn-download {
                padding: 10px 18px;
            }
        }
</style>
</head>
<body class="dark-theme">

<header class="app-header">
    <h1>🧭 Resource Hub</h1>
    <div class="header-right">
        <button class="header-btn" onclick="goHome()">🏠 Home</button>
        <button class="header-btn" id="themeToggle">🌙 Light Mode</button>
        <button class="header-btn logout-btn" onclick="logout()">🚪 Logout</button>
    </div>
</header>

<main class="container">
    <div class="rh-shell">
        <section class="rh-panel">
            <h3>📤 Upload Resource</h3>
            <form id="uploadForm">
                <div class="rh-form-grid">
                    <select id="resourceType" class="modern-input" required>
                        <option value="">Select Category</option>
                        <option value="NOTES">Study Notes</option>
                        <option value="QUESTION_PAPER">Question Paper</option>
                    </select>
                    <input type="number" id="semester" class="modern-input" placeholder="Semester (1-8)" required>
                    <input class="rh-full modern-input" type="text" id="subject" placeholder="Subject Name" required>
                    <input type="text" id="college" class="modern-input" placeholder="College Name" required>
                    <input type="text" id="course" class="modern-input" placeholder="Course" required>
                    <div class="rh-full">
                        <label style="display:block; margin-bottom:8px; font-weight:700;">PDF File</label>
                        <input type="file" id="file" class="modern-input" accept=".pdf" required>
                    </div>
                    <button class="btn-download rh-full" id="uploadBtn" type="submit">🚀 Publish to Hub</button>
                </div>
            </form>
            <p id="msg" class="rh-status"></p>
        </section>

        <section class="rh-panel">
            <h3>🔍 Filter Library</h3>
            <form id="searchForm">
                <div class="rh-form-grid">
                    <input class="rh-full modern-input" type="text" id="searchInput" placeholder="Search by subject or college...">
                    <select id="searchType" class="modern-input">
                        <option value="">All Categories</option>
                        <option value="NOTES">Notes</option>
                        <option value="QUESTION_PAPER">Question Papers</option>
                    </select>
                </div>
                <div style="margin-top:20px; display:flex; gap:10px;">
                    <button class="btn-download" style="width:auto;" type="submit">Filter Resources</button>
                    <button class="rh-btn-muted" type="button" id="resetFilters">Clear All</button>
                </div>
            </form>
        </section>

        <section class="rh-panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3>📚 Library Shelf</h3>
                <p id="resourceCount" style="font-weight:600; color:var(--primary-color);">Loading...</p>
            </div>
            <div id="resourceList" class="resource-grid"></div>
        </section>
    </div>
</main>

<script src="api-config.js"></script>
<script>
    const API = getApiBase() + "/resources";

    const uploadFormEl = document.getElementById("uploadForm");
    const uploadBtnEl = document.getElementById("uploadBtn");
    const resourceListEl = document.getElementById("resourceList");
    const countEl = document.getElementById("resourceCount");
    const msgEl = document.getElementById("msg");

    let allResources = [];

    function esc(v) { return v == null ? "" : String(v).replace(/&/g, "&amp;").replace(/</g, "&lt;"); }

    function renderResources(data) {
        resourceListEl.innerHTML = "";
        countEl.textContent = `${data.length} item${data.length === 1 ? '' : 's'} found`;

        if (data.length === 0) {
            resourceListEl.innerHTML = '<div style="flex:1; text-align:center; padding:50px; opacity:0.6;">No matches found.</div>';
            return;
        }

        data.forEach((r) => {
            const card = document.createElement("article");
            card.className = "resource-card";
            card.innerHTML = `
                <span class="resource-badge">${r.resourceType === "QUESTION_PAPER" ? "Exam Paper" : "Notes"}</span>
                <h4>${esc(r.subject)}</h4>
                <div class="resource-info">
                    <p><strong>College:</strong> ${esc(r.college)}</p>
                    <p><strong>Semester:</strong> ${esc(r.semester)}</p>
                </div>
                <button class="btn-download" onclick="download(${r.id})">📥 Download PDF</button>
            `;
            resourceListEl.appendChild(card);
        });
    }

    async function loadResources() {
        try {
            const res = await fetch(API);
            allResources = await res.json();
            renderResources(allResources);
        } catch (e) { countEl.textContent = "Offline"; }
    }

    function download(id) { window.open(`${API}/download/${id}`); }

    uploadFormEl.addEventListener("submit", async e => {
        e.preventDefault();
        const fd = new FormData();
        fd.append("title", document.getElementById("subject").value);
        fd.append("resourceType", document.getElementById("resourceType").value);
        fd.append("college", document.getElementById("college").value);
        fd.append("course", document.getElementById("course").value);
        fd.append("subject", document.getElementById("subject").value);
        fd.append("semester", document.getElementById("semester").value);
        fd.append("file", document.getElementById("file").files[0]);

        uploadBtnEl.disabled = true;
        uploadBtnEl.textContent = "Uploading...";

        try {
            const res = await fetch(`${API}/upload`, { method: "POST", body: fd });
            if (res.ok) {
                msgEl.textContent = "✅ Upload Successful";
                uploadFormEl.reset();
                loadResources();
            }
        } catch (err) { msgEl.textContent = "❌ Error uploading"; }
        finally { uploadBtnEl.disabled = false; uploadBtnEl.textContent = "🚀 Publish to Hub"; }
    });

    document.getElementById("searchForm").addEventListener("submit", e => {
        e.preventDefault();
        const s = document.getElementById("searchInput").value.toLowerCase();
        const type = document.getElementById("searchType").value;
        const filtered = allResources.filter(r => {
            const matchesText = r.subject.toLowerCase().includes(s) || r.college.toLowerCase().includes(s);
            const matchesType = !type || r.resourceType === type;
            return matchesText && matchesType;
        });
        renderResources(filtered);
    });

    document.getElementById("resetFilters").addEventListener("click", () => {
        document.getElementById("searchForm").reset();
        renderResources(allResources);
    });

    function goHome() { window.location.href = "index.html"; }
    function logout() { localStorage.clear(); window.location.href = "login.html"; }

    const toggleBtn = document.getElementById("themeToggle");
    toggleBtn.addEventListener("click", () => {
        const isDark = document.body.classList.toggle("dark-theme");
        localStorage.setItem("darkTheme", isDark);
        toggleBtn.textContent = isDark ? "🌙 Light Mode" : "☀️ Dark Mode";
    });

    if (localStorage.getItem("darkTheme") === "false") {
        document.body.classList.remove("dark-theme");
        toggleBtn.textContent = "☀️ Dark Mode";
    }

    loadResources();
</script>
</body>
</html>
