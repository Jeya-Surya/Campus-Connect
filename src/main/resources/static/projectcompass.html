<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Campus Connect — Project Compass</title>
    <link rel="stylesheet" href="styles.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- MODERN UI STYLES (High Contrast) --- */

        /* --- CODÉDEX STYLE PROJECT CARDS (NEW) --- */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .project-card {
            background: var(--card-bg, #ffffff);
            border-radius: 20px;
            padding: 25px;
            text-align: left;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 2px solid transparent;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .project-card:hover {
            transform: translateY(-8px);
            border-color: #6c63ff;
            box-shadow: 0 15px 40px rgba(108, 99, 255, 0.15);
        }

        .project-card h3 { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; color: #333; }
        .project-card p.desc { font-size: 0.95rem; color: #555; margin-bottom: 15px; line-height: 1.6; flex-grow: 1; }

        /* --- ROLES SECTION (NEW) --- */
        .roles-section {
            background: rgba(108, 99, 255, 0.08);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            border-left: 4px solid #6c63ff;
            color: #444;
            font-weight: 500;
        }

        /* 1. Skill Pills */
        .skill-tag {
            display: inline-block; padding: 6px 14px; margin: 0 6px 6px 0; border-radius: 20px;
            font-size: 0.85rem; font-weight: 600; background: #e0e7ff; color: #3730a3; transition: all 0.2s ease;
        }

        /* 2. Action Buttons Container */
        .card-actions { display: flex; justify-content: flex-end; align-items: center; gap: 12px; width: 100%; }

        .action-btn {
            padding: 10px 18px; border-radius: 10px; font-size: 0.9rem; font-weight: 700; border: none;
            cursor: pointer; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .btn-delete { background: #fee2e2; color: #b91c1c; }
        .btn-delete:hover { background: #fecaca; }
        .btn-members { background: #e0f2fe; color: #0369a1; }
        .btn-members:hover { background: #bae6fd; }
        .btn-join { background: linear-gradient(135deg, #6c63ff 0%, #5a52e0 100%); color: white; box-shadow: 0 4px 12px rgba(108, 99, 255, 0.25); }
        .btn-join:hover { box-shadow: 0 6px 15px rgba(108, 99, 255, 0.4); }

        .owner-badge { font-size: 0.85rem; color: #495057; font-weight: 700; background: #f8f9fa; border: 1px solid #dde2e6; padding: 8px 16px; border-radius: 10px; display: inline-flex; align-items: center; gap: 6px; }

        /* --- DARK MODE ADJUSTMENTS --- */
        .dark-theme .project-card { background: #1e1e1e; border-color: #333; }
        .dark-theme .project-card:hover { border-color: #8c85ff; }
        .dark-theme .project-card h3 { color: #fff; }
        .dark-theme .project-card p.desc { color: #aaa; }
        .dark-theme .roles-section { background: rgba(108, 99, 255, 0.15); color: #ddd; }

        .dark-theme .skill-tag { background: rgba(99, 102, 241, 0.2); color: #c7d2fe; border: 1px solid rgba(99, 102, 241, 0.3); }
        .dark-theme .btn-delete { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }
        .dark-theme .btn-members { background: rgba(14, 165, 233, 0.2); color: #7dd3fc; }
        .dark-theme .owner-badge { background: rgba(255, 255, 255, 0.05); color: #d1d5db; border-color: rgba(255, 255, 255, 0.1); }

        /* --- STANDARD MODAL STYLES --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px); z-index: 9998; justify-content: center; align-items: center; }
        .modal-content { background: #ffffff; padding: 40px; border-radius: 20px; width: 90%; max-width: 500px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; z-index: 9999; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 28px; cursor: pointer; color: #888; z-index: 10001; }
        .form-group { margin-bottom: 20px; position: relative; z-index: 10000; }
        .form-label { display: block; margin-bottom: 8px; font-weight: 700; color: #444; }
        .modern-input { width: 100%; padding: 15px; border-radius: 12px; background: #f0f2f5; border: 2px solid #ccc; font-size: 1rem; color: #000 !important; box-sizing: border-box; position: relative; z-index: 10001; pointer-events: auto; font-weight: 500; }
        .modern-input:focus { background: #fff; border-color: #6c63ff; outline: none; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-submit { background: #6c63ff; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; z-index: 10001; }
        .btn-cancel { background: transparent; color: #666; border: none; padding: 12px 25px; cursor: pointer; z-index: 10001; font-weight: 600; }

        /* ===== RESPONSIVE STYLES FOR PROJECT COMPASS ===== */
        @media (max-width: 767px) {
            /* Project grid - Single column on mobile */
            .project-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .project-card {
                padding: 20px;
            }

            .project-card h3 {
                font-size: 1.15rem;
            }

            .project-card p.desc {
                font-size: 0.9rem;
            }

            /* Roles section */
            .roles-section {
                padding: 10px;
                font-size: 0.85rem;
            }

            /* Skill tags */
            .skill-tag {
                font-size: 0.8rem;
                padding: 5px 12px;
                margin: 0 4px 4px 0;
            }

            /* Card actions - Stack on mobile */
            .card-actions {
                flex-direction: column;
                gap: 8px;
            }

            .action-btn {
                width: 100%;
                justify-content: center;
                padding: 10px 16px;
            }

            .owner-badge {
                width: 100%;
                justify-content: center;
                padding: 8px 12px;
            }

            /* Modal adjustments */
            .modal-content {
                padding: 25px;
                width: 95%;
            }

            .modern-input {
                padding: 12px;
                font-size: 16px; /* Prevents zoom on iOS */
            }

            .modal-actions {
                flex-direction: column;
                gap: 8px;
            }

            .btn-submit,
            .btn-cancel {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .project-card {
                padding: 16px;
                border-radius: 16px;
            }

            .project-card h3 {
                font-size: 1.1rem;
            }

            .action-btn {
                font-size: 0.85rem;
                padding: 9px 14px;
            }

            .modal-content {
                padding: 20px;
            }
        }

        .request-card { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #6c63ff; }
        .btn-accept { background: #2ecc71; color: white; border:none; padding:8px 12px; border-radius:6px; cursor:pointer; margin-right:5px; font-weight: 600;}
        .btn-reject { background: #e74c3c; color: white; border:none; padding:8px 12px; border-radius:6px; cursor:pointer; font-weight: 600;}

        .dark-theme .modal-content { background: #252525; border: 1px solid #444; color: #fff; }
        .dark-theme .modern-input { background: #333; color: #fff !important; border-color: #555; }
        .dark-theme .form-label { color: #ccc; }
        .dark-theme .request-card { background: #333; color: #fff; }
        .dark-theme h2, .dark-theme h3 { color: #fff; }
    </style>
</head>

<body>

<header class="app-header">
    <h1>🧭 Project Compass</h1>
    <div class="header-right">
        <button class="header-btn" onclick="openRequestsModal()">
            🔔 Requests <span id="reqCount" style="background:red; padding:2px 6px; border-radius:10px; font-size:0.8em; display:none;">0</span>
        </button>
        <button class="header-btn" onclick="goHome()">🏠 Home</button>
        <button class="header-btn" id="themeToggle">🌙 Light Mode</button>
        <button class="header-btn logout-btn" onclick="logout()">🚪 Logout</button>
    </div>
</header>

<main class="container">
    <section class="post-form" style="text-align: center; padding: 60px 20px; background: linear-gradient(135deg, rgba(108,99,255,0.1) 0%, rgba(255,255,255,0) 100%); border-radius: 20px; margin-bottom: 40px;">
        <h2 style="font-size: 2.5rem; margin-bottom: 15px;">Collaborate & Build</h2>
        <p style="color: #555; font-size: 1.1rem; margin-bottom: 30px; font-weight: 500;">Find teammates, assign roles, and build your portfolio.</p>
        <button class="header-btn" onclick="openModal()" style="font-size: 1.1rem; padding: 12px 30px; border-radius: 50px; cursor: pointer; z-index: 10; font-weight: 700;">➕ Start New Project</button>
    </section>

    <section>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3>Latest Opportunities</h3>
        </div>
        <div id="projectList" class="project-grid"></div>
    </section>
</main>

<div id="createModal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2>🚀 Create Project</h2>
        <div class="form-group"><label class="form-label">Project Title</label><input id="modal-title" class="modern-input" placeholder="Type title..."/></div>
        <div class="form-group"><label class="form-label">Description</label><textarea id="modal-desc" class="modern-input" rows="4" placeholder="Type description..."></textarea></div>

        <div class="form-group"><label class="form-label">Open Roles / Positions</label><input id="modal-roles" class="modern-input" placeholder="e.g., UI/UX Designer, React Developer..."/></div>

        <div class="form-group"><label class="form-label">Required Skills</label><input id="modal-skills" class="modern-input" placeholder="Type skills (comma separated)..."/></div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-submit" onclick="createProject()">Publish Project</button>
        </div>
    </div>
</div>

<div id="requestsModal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-btn" onclick="closeRequestsModal()">&times;</span>
        <h2>🔔 Incoming Requests</h2>
        <div id="requestsList" style="margin-top:20px; max-height: 400px; overflow-y: auto;">
            <p>Loading...</p>
        </div>
    </div>
</div>

<div id="membersModal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-btn" onclick="closeMembersModal()">&times;</span>
        <h2>👥 Project Team</h2>
        <div id="membersList" style="margin-top:20px; max-height: 400px; overflow-y: auto;">
            <p>Loading members...</p>
        </div>
    </div>
</div>

<footer class="footer"><p>© 2025 Campus Connect | Project Compass</p></footer>
<script src="api-config.js"></script>
<script src="projectcompass.js"></script>
</body>
</html>
