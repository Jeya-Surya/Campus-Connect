<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Campus Connect — Alumni Onboarding</title>

    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header class="app-header">
    <h1>🎓 Become an Alumni Mentor</h1>
    <div class="header-actions">
        <button class="header-btn" onclick="logout()">🚪 Logout</button>
        <button class="header-btn" id="themeToggle">🌙 Light Mode</button>
    </div>
</header>

<main class="container">
    <section class="post-form" style="max-width:600px;margin:auto;">
        <h2 style="margin-bottom:20px;">Create Alumni Profile</h2>

        <input id="name" placeholder="Your Name" required />
        <input id="dept" placeholder="Field of Study" required />
        <input id="gradYear" type="number" placeholder="Graduation Year" required />
        <input id="company" placeholder="Current Company" required />
        <input id="role" placeholder="Current Role" required />
        <input id="location" placeholder="Location" required />
        <input id="helpAreas" placeholder="Help Areas (Internships, Career, Referrals)" required />

        <button onclick="createAlumni()">Continue</button>
    </section>
</main>

<footer class="footer">
    <p>© 2025 Campus Connect | Alumni Program</p>
</footer>

<script>
    /* ================= SESSION CHECK ================= */
    const session = JSON.parse(localStorage.getItem("user") || "null");

    if (!session || !session.data || !session.data.id) {
      alert("Please login first");
      window.location.href = "login.html";
    }

    const user = session.data;

    /* ================= CREATE ALUMNI ================= */
    async function createAlumni() {
      console.log("Create alumni clicked");

      const payload = {
        userId: user.id,
        name: document.getElementById("name").value.trim(),
        dept: document.getElementById("dept").value.trim(),
        gradYear: Number(document.getElementById("gradYear").value),
        company: document.getElementById("company").value.trim(),
        role: document.getElementById("role").value.trim(),
        location: document.getElementById("location").value.trim(),
        helpAreas: document.getElementById("helpAreas").value.trim(),
        email: user.email
      };

      if (Object.values(payload).some(v => !v)) {
        alert("Please fill all fields");
        return;
      }

      try {
        const res = await fetch("http://localhost:8080/api/alumni", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const err = await res.text();
          throw new Error(err);
        }

       const saved = await res.json();

        // 🔑 STORE ALUMNI ID (THIS WAS MISSING)
        localStorage.setItem("alumniId", saved.id);

        alert("🎉 Alumni profile created!");
        window.location.href = "alumni-dashboard.html";


      } catch (err) {
        console.error(err);
        alert("Failed to create alumni profile. Check console.");
      }
    }

    /* ================= THEME ================= */
    const toggleBtn = document.getElementById("themeToggle");
    const isDark = localStorage.getItem("darkTheme") === "true";

    if (isDark) {
      document.body.classList.add("dark-theme");
      toggleBtn.textContent = "☀️ Light Mode";
    }

    toggleBtn.onclick = () => {
      document.body.classList.toggle("dark-theme");
      localStorage.setItem("darkTheme", document.body.classList.contains("dark-theme"));
      toggleBtn.textContent =
        document.body.classList.contains("dark-theme")
          ? "☀️ Light Mode"
          : "🌙 Light Mode";
    };

    /* ================= LOGOUT ================= */
    function logout() {
      localStorage.clear();
      window.location.href = "login.html";
    }
</script>

</body>
</html>
