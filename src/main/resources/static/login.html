<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Campus Connect — Login</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<header class="app-header">
    <h1>🎓 Campus Connect — Login</h1>

    <div class="header-actions">
        <button class="header-btn" id="themeToggle">🌙 Light Mode</button>
    </div>
</header>


<main class="container">
    <section class="post-form">
        <h2>Login to Continue</h2>
        <input id="email" type="email" placeholder="Email" />
        <input id="password" type="password" placeholder="Password" />
        <button id="loginBtn" type="button">🔑 Login</button>

        <p style="margin-top:15px;text-align:center;">
            Don’t have an account?
            <a href="register.html" style="color:var(--accent-color);font-weight:600;">Register here</a>
        </p>
    </section>
</main>

<footer class="footer">
    <p>© 2025 Campus Connect | Secure Login</p>
</footer>

<script>
    const toggleBtn = document.getElementById("themeToggle");
    const isDark = localStorage.getItem("darkTheme") === "true";
    if (isDark) {
      document.body.classList.add("dark-theme");
      toggleBtn.textContent = "☀️ Light Mode";
    }

    toggleBtn.addEventListener("click", () => {
      document.body.classList.toggle("dark-theme");
      const darkEnabled = document.body.classList.contains("dark-theme");
      localStorage.setItem("darkTheme", darkEnabled);
      toggleBtn.textContent = darkEnabled ? "☀️ Light Mode" : "🌙 Dark Mode";
    });

    // 🔐 LOGIN API CALL
    const API_BASE = "http://localhost:8080/api";
    document.getElementById("loginBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        return alert("Enter email and password");
      }

      try {
        const res = await fetch(`${API_BASE}/users/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        if (res.ok) {
          const user = await res.json();

          // ✅ Store session with expiry (12 hours)
          const userSession = {
            data: user,
            expiry: new Date().getTime() + 12 * 60 * 60 * 1000, // 12 hours
          };
          localStorage.setItem("user", JSON.stringify(userSession));

          // ✅ Redirect to home
          window.location.href = "index.html";
        } else {
          alert("Invalid credentials");
        }
      } catch (error) {
        console.error("Login error:", error);
        alert("Server error. Try again later.");
      }
    });
</script>

</body>
</html>
