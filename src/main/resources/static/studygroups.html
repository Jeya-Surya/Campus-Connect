<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Campus Connect — Clubs</title>
    <link rel="stylesheet" href="styles.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* --- CODÉDEX STYLE CLUB CARDS --- */
        .club-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; margin-top: 20px; }
        .club-card { background: var(--card-bg, #ffffff); border-radius: 20px; padding: 30px 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 2px solid transparent; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; }
        .club-card:hover { transform: translateY(-8px); border-color: #6c63ff; box-shadow: 0 15px 40px rgba(108, 99, 255, 0.15); }
        .club-emoji { font-size: 3.5rem; margin-bottom: 15px; background: #f0f2f5; width: 90px; height: 90px; display: flex; align-items: center; justify-content: center; border-radius: 50%; box-shadow: inset 0 4px 10px rgba(0,0,0,0.05); }
        .club-card h3 { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; color: #333; }
        .club-card p { font-size: 0.9rem; color: #666; margin-bottom: 20px; line-height: 1.5; flex-grow: 1; }

        .btn-join-club { background: linear-gradient(135deg, #6c63ff 0%, #5a52e0 100%); color: white; border: none; padding: 10px 24px; border-radius: 12px; font-weight: 700; font-size: 0.95rem; cursor: pointer; width: 100%; transition: all 0.2s ease; box-shadow: 0 4px 15px rgba(108, 99, 255, 0.3); }
        .btn-join-club:hover { transform: scale(1.03); box-shadow: 0 6px 20px rgba(108, 99, 255, 0.4); }

        /* --- DARK MODE TWEAKS --- */
        body.dark-theme .club-card { background: #1e1e1e; border-color: #333; }
        body.dark-theme .club-card:hover { border-color: #8c85ff; }
        body.dark-theme .club-emoji { background: #2a2a2a; }
        body.dark-theme .club-card h3 { color: #fff; }
        body.dark-theme .club-card p { color: #aaa; }

        /* Modal Styles */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px); z-index: 9998; justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg, #ffffff); padding: 40px; border-radius: 20px; width: 90%; max-width: 450px; position: relative; z-index: 9999; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modern-input { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #ccc; font-size: 1rem; margin-bottom: 15px; background: #f0f2f5; }
        body.dark-theme .modern-input { background: #333; color: #fff; border-color: #555; }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 28px; cursor: pointer; color: #888; }

        /* ===== RESPONSIVE STYLES FOR STUDY GROUPS ===== */
        @media (max-width: 767px) {
            /* Club grid - Single column on mobile */
            .club-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .club-card {
                padding: 24px 18px;
            }

            .club-emoji {
                width: 75px;
                height: 75px;
                font-size: 3rem;
            }

            .club-card h3 {
                font-size: 1.15rem;
            }

            .club-card p {
                font-size: 0.85rem;
            }

            .btn-join-club {
                padding: 10px 20px;
                font-size: 0.9rem;
            }

            /* Hero section */
            .post-form h2 {
                font-size: 1.8rem !important;
            }

            .post-form p {
                font-size: 0.95rem !important;
            }

            /* Modal adjustments */
            .modal-content {
                padding: 25px;
                width: 95%;
            }

            .modern-input {
                padding: 12px;
                font-size: 16px; /* Prevents zoom on iOS */
            }

            #clubEmoji {
                font-size: 2rem !important;
                width: 80px !important;
                padding: 8px !important;
            }
        }

        @media (max-width: 480px) {
            .club-card {
                padding: 20px 16px;
            }

            .club-emoji {
                width: 65px;
                height: 65px;
                font-size: 2.5rem;
            }

            .club-card h3 {
                font-size: 1.1rem;
            }

            .post-form h2 {
                font-size: 1.5rem !important;
            }

            .modal-content {
                padding: 20px;
            }
        }
</style>
</head>

<body>

<header class="app-header">
    <h1>📚 Study Groups</h1>
    <div class="header-right">
        <button class="header-btn" onclick="goHome()">🏠 Home</button>
        <button class="header-btn" id="themeToggle">🌙 Light Mode</button>
        <button class="header-btn logout-btn" onclick="logout()">🚪 Logout</button>
    </div>
</header>

<main class="container">
    <section class="post-form" style="text-align: center; padding: 50px 20px; border-radius: 20px;">
        <h2 style="font-size: 2.5rem; margin-bottom: 10px;">Find Your Tribe 🚀</h2>
        <p style="color: #666; font-size: 1.1rem; margin-bottom: 25px; font-weight: 500;">Join a community of learners, share resources, and grow together.</p>
        <button class="btn-join-club" onclick="openModal()" style="width: auto; padding: 12px 30px; font-size: 1.1rem; border-radius: 50px;">
            ✨ Start a New Club
        </button>
    </section>

    <section>
        <h3 style="margin-bottom: 10px; font-size: 1.5rem;">Explore Clubs</h3>
        <div id="clubList" class="club-grid">
            <p>Loading clubs...</p>
        </div>
    </section>
</main>

<div id="createModal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 style="text-align:center; margin-bottom: 20px;">✨ New Club</h2>

        <div style="text-align: center; margin-bottom: 15px;">
            <label style="font-weight:600; color:#555; display:block; margin-bottom:5px;">Club Emoji</label>
            <input id="clubEmoji" class="modern-input" style="font-size: 2.5rem; text-align: center; width: 100px; padding: 10px; border-radius: 15px;" value="🚀" maxlength="2">
            <p style="font-size: 0.8rem; color: #888; margin-top: -5px;">Press <b>Win + .</b> (Windows) or <b>Cmd + Ctrl + Space</b> (Mac) to open emojis.</p>
        </div>

        <input id="clubName" class="modern-input" placeholder="Club Name (e.g. Java Wizards)"/>
        <textarea id="clubDesc" class="modern-input" rows="3" placeholder="What is this club about?"></textarea>

        <button class="btn-join-club" onclick="createClub()">Create Club</button>
    </div>
</div>

<footer class="footer"><p>© 2025 Campus Connect | Study Clubs</p></footer>
<script src="api-config.js"></script>
<script src="studygroups.js"></script>
</body>
</html>
