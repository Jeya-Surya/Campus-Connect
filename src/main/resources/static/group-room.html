<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Campus Connect — Club Room</title>
    <link rel="stylesheet" href="styles.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .room-layout {
            display: flex; flex: 1; overflow: hidden; max-width: 1400px; margin: 0 auto; width: 100%;
            background: var(--background-light, #f5f8ff);
        }

        /* --- COLLAPSIBLE LEFT SIDEBAR --- */
        .room-sidebar {
            width: 320px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            border-right: 1px solid var(--border-light, #e0e6ef); display: flex; flex-direction: column;
            padding: 20px; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.02); z-index: 10;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .room-sidebar.collapsed { width: 0; padding: 0; border: none; overflow: hidden; opacity: 0; }

        .club-header { text-align: center; padding-bottom: 15px; border-bottom: 2px dashed var(--border-light, #e0e6ef); margin-bottom: 15px; }
        .club-header-emoji { font-size: 3.5rem; margin-bottom: 5px; }
        .club-header h2 { font-size: 1.3rem; color: var(--primary-color, #007bff); margin: 0 0 5px 0; font-weight: 700; }
        .club-header p { font-size: 0.85rem; color: var(--text-muted, #6c757d); margin: 0; line-height: 1.4; }

        /* --- GROUP TASKS --- */
        .sidebar-section-title { font-size: 0.85rem; font-weight: 700; color: var(--text-muted, #888); text-transform: uppercase; margin-bottom: 10px; margin-top: 10px; }
        .tasks-wrapper { max-height: 200px; overflow-y: auto; margin-bottom: 10px; }
        .task-item { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 8px; background: rgba(0,0,0,0.03); margin-bottom: 6px; font-size: 0.85rem; font-weight: 500; }
        .task-item.done span { text-decoration: line-through; color: #888; }
        .task-item input[type="checkbox"] { cursor: pointer; accent-color: #6c63ff; width: 16px; height: 16px; }
        .task-item span { flex: 1; word-break: break-word; }
        .task-item .btn-del-task { color: #dc2626; cursor: pointer; border: none; background: none; font-size: 0.9rem; opacity: 0.5; transition: 0.2s;}
        .task-item:hover .btn-del-task { opacity: 1; }

        .task-input-row { display: flex; gap: 5px; margin-bottom: 20px; }
        .task-input-row input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 20px; outline: none; font-family: 'Poppins'; font-size: 0.8rem; }
        .task-input-row button { background: #6c63ff; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-weight: bold; }

        /* --- MEMBERS --- */
        .members-wrapper { flex: 1; overflow-y: auto; margin-bottom: 15px; }
        .member-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 12px; margin-bottom: 8px; background: var(--card-bg, #ffffff); box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid var(--border-light, #eee); }
        .member-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #6c63ff, #5a52e0); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem;}
        .member-name { font-size: 0.9rem; font-weight: 600; color: var(--text-dark, #333); }

        .btn-leave { background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; text-align: center; transition: 0.2s; width: 100%; flex-shrink: 0; }
        .btn-leave:hover { background: #fecaca; }

        /* --- CHAT FEED --- */
        .room-main { flex: 1; display: flex; flex-direction: column; background: transparent; position: relative; }
        .feed-container { flex: 1; padding: 25px 5%; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }

        .msg-row { display: flex; width: 100%; }
        .msg-row.mine { justify-content: flex-end; }
        .msg-row.theirs { justify-content: flex-start; }

        .msg-bubble { max-width: 70%; padding: 10px 14px; border-radius: 16px; box-shadow: 0 3px 10px rgba(0,0,0,0.05); position: relative; display: flex; flex-direction: column; word-wrap: break-word; }
        .msg-row.mine .msg-bubble { background: linear-gradient(135deg, #6c63ff 0%, #5a52e0 100%); color: #ffffff; border-bottom-right-radius: 4px; }
        .msg-row.theirs .msg-bubble { background: #ffffff; color: #212529; border-bottom-left-radius: 4px; border: 1px solid rgba(0,0,0,0.05); }

        .msg-author { font-size: 0.8rem; font-weight: 700; color: #6c63ff; margin-bottom: 4px; }
        .msg-row.mine .msg-author { display: none; }

        /* HOVER ACTIONS (Reply & Delete) */
        .msg-actions { position: absolute; top: 50%; transform: translateY(-50%); opacity: 0; transition: all 0.2s ease; display: flex; gap: 5px; background: rgba(255,255,255,0.9); padding: 5px; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .msg-row.mine .msg-actions { left: -75px; }
        .msg-row.theirs .msg-actions { right: -75px; }
        .msg-row:hover .msg-actions { opacity: 1; }
        .action-icon { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.9rem; border: none; transition: 0.2s; }
        .action-icon.reply { background: #e0e7ff; color: #4f46e5; }
        .action-icon.delete { background: #fee2e2; color: #dc2626; }
        .action-icon:hover { transform: scale(1.1); filter: brightness(0.9); }

        /* QUOTE (REPLY) BLOCK INSIDE BUBBLE */
        .msg-quote { background: rgba(0,0,0,0.1); border-left: 4px solid rgba(0,0,0,0.2); padding: 8px 10px; border-radius: 8px; margin-bottom: 8px; font-size: 0.8rem; cursor: pointer; }
        .msg-row.theirs .msg-quote { background: rgba(108, 99, 255, 0.1); border-color: #6c63ff; }
        .quote-author { font-weight: 700; margin-bottom: 2px; color: inherit; opacity: 0.8; }
        .quote-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.9; }

        /* IMAGE UPLOAD INSIDE BUBBLE */
        .msg-image { max-width: 100%; max-height: 250px; border-radius: 8px; margin-bottom: 8px; object-fit: contain; background: rgba(0,0,0,0.05); cursor: pointer; }

        .msg-content { font-size: 0.95rem; line-height: 1.5; font-weight: 500; white-space: pre-wrap; }

        /* =========================================
           BULLETPROOF CODE SNIPPET FORMATTING
           ========================================= */

        /* The main dark block for multiline code */
        .msg-content pre {
            background: #1e1e1e !important;
            color: #e0e0e0 !important;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            white-space: pre;
            font-family: Consolas, 'Courier New', monospace;
            font-size: 0.85rem;
            margin: 8px 0;
            border: 1px solid #333 !important;
            line-height: 1.4;
        }

        /* Prevent inline code styles from stacking inside the pre block */
        .msg-content pre code {
            background: transparent !important;
            color: inherit !important;
            padding: 0;
            border-radius: 0;
        }

        /* Inline code styling (e.g. `var x`) */
        .msg-content code {
            background: rgba(0, 0, 0, 0.08);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: Consolas, 'Courier New', monospace;
            font-size: 0.85rem;
        }

        .msg-time { font-size: 0.7rem; align-self: flex-end; margin-top: 4px; margin-left: 20px; font-weight: 500; }
        .msg-row.mine .msg-time { color: rgba(255, 255, 255, 0.75); }
        .msg-row.theirs .msg-time { color: #999; }

        /* --- SMART INPUT AREA --- */
        .input-wrapper { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-top: 1px solid var(--border-light, #eee); display: flex; flex-direction: column; }

        .preview-bar { padding: 10px 5%; background: #f8f9fa; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; color: #555; font-weight: 500;}
        .preview-bar button { background: none; border: none; color: #888; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .preview-bar button:hover { color: #dc2626; }

        .input-area { padding: 15px 5%; display: flex; gap: 12px; align-items: flex-end; }

        .btn-attach { background: transparent; border: none; font-size: 1.5rem; color: #888; cursor: pointer; padding: 10px; transition: 0.2s; }
        .btn-attach:hover { color: #6c63ff; transform: scale(1.1); }

        .input-area textarea { flex: 1; padding: 12px 20px; border-radius: 24px; border: 1px solid var(--border-light, #ccc); font-family: 'Poppins', sans-serif; font-size: 1rem; outline: none; background: var(--background-light, #f8f9fa); color: var(--text-dark, #000); transition: border-color 0.3s ease; resize: none; line-height: 1.5; min-height: 24px; max-height: 150px; overflow-y: auto; }
        .input-area textarea:focus { border-color: #6c63ff; background: #fff; }

        .btn-send { background: linear-gradient(135deg, #6c63ff, #5a52e0); color: white; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 1.2rem; cursor: pointer; box-shadow: 0 4px 15px rgba(108, 99, 255, 0.3); display: flex; align-items: center; justify-content: center; transition: 0.2s; flex-shrink: 0; }
        .btn-send:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(108, 99, 255, 0.4); }

        /* --- DARK MODE --- */
        body.dark-theme .room-layout { background: #121212; }
        body.dark-theme .room-sidebar { background: rgba(30, 30, 30, 0.9); border-color: #2c2c2c; }
        body.dark-theme .club-header, body.dark-theme .preview-bar { border-color: #333; }
        body.dark-theme .club-header h2 { color: #fff; }
        body.dark-theme .member-item, body.dark-theme .task-item { background: #1a1a1a; border-color: #333; }
        body.dark-theme .member-name { color: #eee; }
        body.dark-theme .task-input-row input { background: #2a2a2a; border-color: #444; color: white;}
        body.dark-theme .btn-leave { background: rgba(220, 38, 38, 0.1); border-color: rgba(220, 38, 38, 0.3); color: #f87171; }

        body.dark-theme .msg-row.mine .msg-bubble { background: linear-gradient(135deg, #5a52e0 0%, #483d8b 100%); }
        body.dark-theme .msg-row.theirs .msg-bubble { background: #1e1e1e; border-color: #2c2c2c; color: #eee; }
        body.dark-theme .msg-actions { background: rgba(30,30,30,0.9); box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        body.dark-theme .action-icon.reply { background: rgba(79, 70, 229, 0.2); }
        body.dark-theme .action-icon.delete { background: rgba(220, 38, 38, 0.2); }

        body.dark-theme .input-wrapper { background: rgba(20, 20, 20, 0.95); border-color: #2c2c2c; }
        body.dark-theme .preview-bar { background: #1a1a1a; color: #ccc;}
        body.dark-theme .input-area textarea { background: #2a2a2a; border-color: #444; color: #fff; }
        body.dark-theme .input-area textarea:focus { border-color: #8c85ff; background: #1e1e1e; }

        /* Dark mode inline code adjustment */
        body.dark-theme .msg-content code { background: rgba(255, 255, 255, 0.15); color: #eee; }

        /* ===== RESPONSIVE STYLES FOR GROUP ROOM ===== */

        /* Tablet breakpoint (768px - 1024px) */
        @media (max-width: 1024px) and (min-width: 768px) {
            /* Header buttons - Smaller on tablet */
            .header-btn {
                padding: 7px 14px;
                font-size: 0.85rem;
                min-width: 90px;
            }

            /* Sidebar narrower on tablet */
            .room-sidebar {
                width: 280px;
                padding: 16px;
            }

            .feed-container {
                padding: 20px 3%;
            }

            .club-header-emoji {
                font-size: 3.2rem;
            }

            .club-header h2 {
                font-size: 1.25rem;
            }

            .msg-bubble {
                max-width: 75%;
            }

            .btn-send {
                width: 48px;
                height: 48px;
            }
        }

        /* Mobile breakpoint (max-width: 767px) */
        @media (max-width: 767px) {
            /* Collapsible sidebar on mobile */
            .room-sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100vh;
                width: 280px;
                z-index: 100;
                padding: 16px;
                box-shadow: 4px 0 15px rgba(0,0,0,0.2);
            }

            .room-sidebar.collapsed {
                transform: translateX(-100%);
            }

            .room-main {
                width: 100%;
            }

            /* Feed adjustments */
            .feed-container {
                padding: 15px 3%;
                gap: 10px;
            }

            /* Message bubbles */
            .msg-bubble {
                max-width: 85%;
                padding: 9px 12px;
                font-size: 0.9rem;
            }

            .msg-content {
                font-size: 0.9rem;
            }

            .msg-actions {
                opacity: 1; /* Always visible on mobile */
                position: relative;
                top: auto;
                left: auto !important;
                right: auto !important;
                transform: none;
                margin-top: 8px;
                justify-content: flex-start;
            }

            /* Input area */
            .input-area {
                padding: 12px 3%;
                gap: 8px;
            }

            .input-area textarea {
                padding: 10px 16px;
                font-size: 16px; /* Prevents zoom on iOS */
            }

            .btn-send {
                width: 44px;
                height: 44px;
                font-size: 1.1rem;
            }

            .btn-attach {
                font-size: 1.3rem;
                padding: 8px;
            }

            /* Preview bar */
            .preview-bar {
                padding: 8px 3%;
                font-size: 0.8rem;
            }

            /* Sidebar components */
            .club-header-emoji {
                font-size: 3rem;
            }

            .club-header h2 {
                font-size: 1.2rem;
            }

            .club-header p {
                font-size: 0.8rem;
            }

            .sidebar-section-title {
                font-size: 0.8rem;
            }

            .member-item {
                padding: 8px;
            }

            .member-avatar {
                width: 28px;
                height: 28px;
                font-size: 0.8rem;
            }

            .member-name {
                font-size: 0.85rem;
            }

            .task-item {
                padding: 7px;
                font-size: 0.8rem;
            }

            .btn-leave {
                padding: 10px;
                font-size: 0.9rem;
            }
        }

        /* Small mobile breakpoint (max-width: 480px) */
        @media (max-width: 480px) {
            /* Even more compact for small phones */
            .room-sidebar {
                width: 260px;
                padding: 14px;
            }

            .msg-bubble {
                max-width: 90%;
                padding: 8px 11px;
            }

            .msg-content {
                font-size: 0.85rem;
            }

            .input-area textarea {
                padding: 9px 14px;
            }

            .btn-send {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }

            .club-header-emoji {
                font-size: 2.5rem;
            }

            .msg-image {
                max-height: 180px;
            }

            .action-icon {
                width: 28px;
                height: 28px;
                font-size: 0.85rem;
            }
        }
</style>
</head>

<body>

<header class="app-header">
    <div style="display: flex; align-items: center; gap: 15px;">
        <button class="header-btn" onclick="window.location.href='studygroups.html'">⬅ Back</button>
        <button class="header-btn" id="sidebarToggle" style="font-size: 1.2rem; padding: 5px 15px;">☰</button>
        <h1 style="margin:0; font-size:1.4rem;">Club Room</h1>
    </div>
    <div class="header-right">
        <button class="header-btn" id="themeToggle">🌙 Light Mode</button>
    </div>
</header>

<div class="room-layout">
    <aside class="room-sidebar" id="sidebar">
        <div class="club-header">
            <div id="roomEmoji" class="club-header-emoji">⏳</div>
            <h2 id="roomName">Loading...</h2>
            <p id="roomDesc">Fetching club details...</p>
        </div>

        <div class="sidebar-section-title">✅ Group Tasks</div>
        <div class="tasks-wrapper" id="taskList"></div>
        <div class="task-input-row">
            <input type="text" id="taskInput" placeholder="Add a new task..." autocomplete="off">
            <button onclick="addTask()">+</button>
        </div>

        <div class="sidebar-section-title" style="margin-top:10px;">👥 Members</div>
        <div class="members-wrapper" id="membersList">
            <p style="color:#888; font-size:0.9rem;">Loading members...</p>
        </div>

        <button class="btn-leave" id="leaveBtn" onclick="leaveClub()">🚪 Leave Club</button>
    </aside>

    <main class="room-main">
        <div class="feed-container" id="feedContainer">
        </div>

        <div class="input-wrapper">
            <div id="replyPreviewBar" class="preview-bar" style="display:none;">
                <span>Replying to <b id="replyAuthor"></b>: <span id="replyTextSnippet"></span></span>
                <button onclick="cancelReply()">✕</button>
            </div>
            <div id="filePreviewBar" class="preview-bar" style="display:none;">
                <span>📎 Attached: <span id="fileNameDisplay"></span></span>
                <button onclick="cancelFile()">✕</button>
            </div>

            <div class="input-area">
                <button class="btn-attach" onclick="document.getElementById('fileInput').click()" title="Attach File/Image">📎</button>
                <input type="file" id="fileInput" style="display:none" onchange="handleFileSelect(event)">

                <textarea id="postInput" rows="1" placeholder="Message the club... (Use ```code``` or **bold**)"></textarea>
                <button class="btn-send" onclick="sendPost()">➤</button>
            </div>
        </div>
    </main>
</div>

<script src="api-config.js"></script>
<script src="group-room.js"></script>
</body>
</html>
