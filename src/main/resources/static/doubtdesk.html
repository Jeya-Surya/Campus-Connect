<!doctype html>
<html lang="en">
<head>
    <script>
        window.addEventListener("DOMContentLoaded", () => {
          const sessionData = localStorage.getItem("user");

          if (!sessionData) {
            window.location.href = "login.html";
            return;
          }

          try {
            const session = JSON.parse(sessionData);
            const now = new Date().getTime();
            if (now > session.expiry) {
              localStorage.removeItem("user");
              window.location.href = "login.html";
            }
          } catch (error) {
            localStorage.removeItem("user");
            window.location.href = "login.html";
          }
        });
    </script>


    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Campus Connect — Doubt Desk</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<header class="app-header">
    <h1>📘 Campus Connect — Doubt Desk</h1>
    <div class="header-actions">
        <button class="header-btn" onclick="goHome()">🏠 Home</button>
        <button class="header-btn logout-btn" onclick="logout()">🚪 Logout</button>
        <button class="header-btn" id="themeToggle">🌙 Light Mode</button>
    </div>
</header>


<main class="container">
    <!-- Post a new doubt -->
    <section class="post-form">
        <h2>Ask a Doubt</h2>
        <input id="title" placeholder="Title (e.g. Binary Tree traversal question)" />
        <textarea id="description" placeholder="Describe your doubt in detail"></textarea>
        <input id="author" placeholder="Your name, course & year" />
        <button id="postBtn" type="button">🚀 Post Doubt</button>
    </section>

    <!-- Display doubts -->
    <section class="doubts-list">
        <h2>Recent Doubts</h2>
        <div id="doubts" class="doubts-container"></div>
    </section>
</main>

<!-- Template for rendering each doubt -->
<template id="doubt-template">
    <article class="doubt-card">
        <div class="doubt-header">
            <h3 class="doubt-title"></h3>
            <p class="doubt-meta"></p>
        </div>
        <p class="doubt-desc"></p>

        <!-- Answers container -->
        <div class="answers answers-list">
            <h4>Answers</h4>
        </div>

        <!-- Answer form inside each doubt card -->
        <div class="answer-form">
            <input class="answer-author" placeholder="Your name" />
            <input class="answer-text" placeholder="Your answer" />
            <button class="answer-submit" type="button">💬 Submit</button>
        </div>
    </article>
</template>

<footer class="footer">
    <p>© 2025 Campus Connect | Made with ❤️ for learners</p>
</footer>

<script src="api-config.js"></script>
<script src="app.js"></script>

<!-- 🌙 Theme Toggle Script -->
<script>
    function goHome() {
  window.location.href = "index.html";
}

function logout() {
  localStorage.removeItem("user");
  window.location.href = "login.html";
}

 // 🌙 Dark Mode Toggle (consistent across pages)
    const toggleBtn = document.getElementById("themeToggle");
    const isDark = localStorage.getItem("darkTheme") === "true";

    if (isDark) {
      document.body.classList.add("dark-theme");
      toggleBtn.textContent = "☀️ Light Mode";
    }

    toggleBtn.addEventListener("click", () => {
      document.body.classList.toggle("dark-theme");
      const darkEnabled = document.body.classList.contains("dark-theme");
      localStorage.setItem("darkTheme", darkEnabled);
      toggleBtn.textContent = darkEnabled ? "☀️ Light Mode" : "🌙 Dark Mode";
    });

</script>
</body>
</html>
