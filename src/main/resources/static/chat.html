<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Connect - Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script src="api-config.js"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #f5f8ff);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        body.dark-theme { background: linear-gradient(135deg, #0d0d0d, #1a1a1a); }

        .chat-header {
            background: linear-gradient(135deg, #6c63ff 0%, #5a52e0 100%);
            color: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b85ff, #6c63ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .name { font-weight: 600; }
        .status { font-size: 12px; opacity: 0.9; }
        .header-actions { display: flex; gap: 8px; }
        .header-btn {
            border: none;
            border-radius: 999px;
            padding: 7px 12px;
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
        }

        .chat-body {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .date-header {
            text-align: center;
            font-size: 12px;
            color: #667781;
            margin: 6px 0;
        }
        .date-header span {
            background: rgba(255,255,255,0.8);
            border: 1px solid rgba(0,0,0,0.06);
            border-radius: 999px;
            padding: 4px 10px;
        }

        .msg-row { display: flex; max-width: 78%; }
        .msg-row.right { align-self: flex-end; }
        .msg-row.left { align-self: flex-start; }

        .msg-bubble {
            position: relative;
            padding: 10px 12px 8px;
            border-radius: 14px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.06);
        }
        .msg-row.right .msg-bubble {
            background: linear-gradient(135deg, #6c63ff 0%, #5a52e0 100%);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .msg-row.left .msg-bubble {
            background: #fff;
            border: 1px solid rgba(0,0,0,0.06);
            color: #212529;
            border-bottom-left-radius: 4px;
        }

        .msg-sender {
            font-size: 12px;
            color: #6c63ff;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .msg-row.right .msg-sender { display: none; }

        .msg-text {
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 14px;
        }

        .msg-file {
            margin-top: 6px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            text-decoration: none;
            border-radius: 8px;
            padding: 6px 8px;
            background: rgba(255,255,255,0.2);
            color: inherit;
        }
        .msg-row.left .msg-file { background: rgba(108,99,255,0.1); color: #4f46e5; }
        .msg-image {
            margin-top: 8px;
            width: 240px;
            max-width: 100%;
            border-radius: 10px;
            display: block;
        }

        .msg-meta {
            margin-top: 6px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: center;
        }
        .msg-time {
            font-size: 11px;
            opacity: 0.85;
            white-space: nowrap;
        }
        .delete-btn {
            border: none;
            background: transparent;
            color: inherit;
            opacity: 0.8;
            cursor: pointer;
            font-size: 12px;
            padding: 0;
        }
        .delete-btn:hover { opacity: 1; text-decoration: underline; }

        .chat-input-wrap {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            border-top: 1px solid #e1e8ed;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .file-preview {
            display: none;
            font-size: 12px;
            color: #555;
            align-items: center;
            justify-content: space-between;
        }
        .file-preview button {
            border: none;
            background: none;
            color: #dc2626;
            cursor: pointer;
            font-weight: 700;
        }
        .chat-input {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .attach-btn {
            border: none;
            background: transparent;
            color: #6c63ff;
            cursor: pointer;
            font-size: 22px;
        }
        .chat-input input[type="text"] {
            flex: 1;
            padding: 11px 16px;
            border-radius: 22px;
            border: 1px solid #dcdcdc;
            outline: none;
            background: #f8f9fa;
            font-size: 14px;
        }
        .chat-input input[type="text"]:focus {
            border-color: #6c63ff;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(108,99,255,0.12);
        }
        .send-btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            color: #fff;
            background: linear-gradient(135deg, #6c63ff 0%, #5a52e0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .msg-actions {
            position: absolute;
            top: -14px;
            right: 8px;
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: 0.2s ease;
        }

        .msg-row:hover .msg-actions {
            opacity: 1;
        }

        .action-btn {
            border: none;
            border-radius: 999px;
            padding: 3px 8px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.85);
            color: #4f46e5;
        }

        /* ===== RESPONSIVE CHAT STYLES ===== */
        @media (max-width: 767px) {
            /* Chat header - Reduce padding */
            .chat-header {
                padding: 10px 12px;
            }

            .header-left {
                gap: 8px;
            }

            .avatar {
                width: 36px;
                height: 36px;
                font-size: 14px;
            }

            .name {
                font-size: 14px;
            }

            .status {
                font-size: 11px;
            }

            .header-btn {
                padding: 6px 10px;
                font-size: 11px;
            }

            /* Message bubbles - Increase max-width on mobile */
            .msg-row {
                max-width: 85%;
            }

            .msg-bubble {
                padding: 8px 10px 6px;
                font-size: 14px;
            }

            .msg-text {
                font-size: 13px;
            }

            .msg-image {
                width: 180px;
            }

            /* Chat body - Adjust padding */
            .chat-body {
                padding: 12px;
                gap: 10px;
            }

            /* Input area - Adjust for mobile */
            .chat-input-wrap {
                padding: 8px 10px;
            }

            .chat-input input[type="text"] {
                padding: 10px 14px;
                font-size: 16px; /* Prevents zoom on iOS */
            }

            .send-btn {
                width: 40px;
                height: 40px;
            }

            .attach-btn {
                font-size: 20px;
            }

            /* Message actions - Make more accessible on mobile */
            .msg-actions {
                opacity: 1; /* Always visible on mobile */
                position: relative;
                top: auto;
                right: auto;
                margin-top: 4px;
            }

            .action-btn {
                font-size: 10px;
                padding: 4px 8px;
            }
        }

        @media (max-width: 480px) {
            /* Even more compact for small phones */
            .chat-header {
                padding: 8px 10px;
            }

            .name {
                font-size: 13px;
            }

            .header-btn {
                padding: 5px 8px;
                font-size: 10px;
            }

            .msg-row {
                max-width: 90%;
            }

            .msg-bubble {
                padding: 7px 9px 5px;
            }

            .msg-text {
                font-size: 12px;
            }

            .msg-image {
                width: 150px;
            }

            .chat-body {
                padding: 10px;
            }
        }

        .msg-row.left .action-btn {
            background: rgba(108, 99, 255, 0.14);
        }

        .quote-block {
            margin-bottom: 8px;
            padding: 7px 9px;
            border-radius: 8px;
            border-left: 3px solid rgba(108, 99, 255, 0.8);
            background: rgba(108, 99, 255, 0.12);
            font-size: 12px;
        }

        .quote-author {
            font-weight: 700;
            margin-bottom: 2px;
        }

        .reply-preview {
            display: none;
            font-size: 12px;
            color: #555;
            align-items: center;
            justify-content: space-between;
            padding: 4px 2px;
        }
        .reply-preview button {
            border: none;
            background: none;
            color: #dc2626;
            cursor: pointer;
            font-weight: 700;
        }

        body.dark-theme .reply-preview { color: #ccc; }
        body.dark-theme .quote-block { background: rgba(108, 99, 255, 0.2); }
    </style>
</head>
<body>
<div class="chat-header">
    <div class="header-left">
        <div class="avatar" id="chatAvatar">M</div>
        <div>
            <div class="name" id="chatName">Mentorship Chat</div>
            <div class="status">online</div>
        </div>
    </div>
    <div class="header-actions">
        <button class="header-btn" onclick="goBack()">Back</button>
        <button class="header-btn" id="themeToggle">Theme</button>
    </div>
</div>

<div id="chatBody" class="chat-body">
    <div class="loading">Loading messages...</div>
</div>

<div class="chat-input-wrap">
    <div id="replyPreview" class="reply-preview">
        <span>Replying to <b id="replyAuthor"></b>: <span id="replySnippet"></span></span>
        <button onclick="clearReplyState()">x</button>
    </div>
    <div id="filePreview" class="file-preview">
        <span>Attachment: <span id="filePreviewName"></span></span>
        <button onclick="clearSelectedFile()">x</button>
    </div>
    <div class="chat-input">
        <button class="attach-btn" onclick="triggerFile()" title="Attach file">📎</button>
        <input type="file" id="fileInput" style="display:none" />
        <input type="text" id="messageInput" placeholder="Type a message..." />
        <button class="send-btn" onclick="sendMessage()"><i class="material-icons">send</i></button>
    </div>
</div>

<script>
    const session = JSON.parse(localStorage.getItem("user"));
    const requestId = localStorage.getItem("requestId");
    if (!session || !session.data || !requestId) {
        alert("Chat context missing");
        window.location.href = "recent-chats.html";
    }

    const API = getApiBase();
    const currentUser = session.data;
    const chatBody = document.getElementById("chatBody");
    const messageInput = document.getElementById("messageInput");
    const fileInput = document.getElementById("fileInput");
    const filePreview = document.getElementById("filePreview");
    const filePreviewName = document.getElementById("filePreviewName");
    const replyPreview = document.getElementById("replyPreview");
    const replyAuthor = document.getElementById("replyAuthor");
    const replySnippet = document.getElementById("replySnippet");
    const renderedMessageIds = new Set();
    let stompClient = null;
    let lastDateHeader = "";
    let replyToState = null;

    const themeToggle = document.getElementById("themeToggle");
    if (localStorage.getItem("darkTheme") === "true") {
        document.body.classList.add("dark-theme");
    }
    themeToggle.textContent = document.body.classList.contains("dark-theme") ? "Light" : "Dark";
    themeToggle.addEventListener("click", () => {
        document.body.classList.toggle("dark-theme");
        localStorage.setItem("darkTheme", document.body.classList.contains("dark-theme"));
        themeToggle.textContent = document.body.classList.contains("dark-theme") ? "Light" : "Dark";
    });

    function goBack() {
        window.location.href = "recent-chats.html";
    }

    function triggerFile() {
        fileInput.click();
    }

    function clearSelectedFile() {
        fileInput.value = "";
        filePreview.style.display = "none";
        filePreviewName.textContent = "";
    }

    function clearReplyState() {
        replyToState = null;
        replyPreview.style.display = "none";
        replyAuthor.textContent = "";
        replySnippet.textContent = "";
    }

    fileInput.addEventListener("change", () => {
        if (!fileInput.files.length) {
            clearSelectedFile();
            return;
        }
        filePreviewName.textContent = fileInput.files[0].name;
        filePreview.style.display = "flex";
    });

    function parseSpringDate(raw) {
        if (!raw) return new Date();
        if (Array.isArray(raw)) {
            return new Date(raw[0], (raw[1] || 1) - 1, raw[2] || 1, raw[3] || 0, raw[4] || 0, raw[5] || 0);
        }
        return new Date(raw);
    }

    function formatFullDateTime(dateStr) {
        const d = parseSpringDate(dateStr);
        if (isNaN(d.getTime())) return "";
        return d.toLocaleString([], {
            day: "2-digit",
            month: "short",
            hour: "2-digit",
            minute: "2-digit"
        });
    }

    function formatDate(dateStr) {
        const d = parseSpringDate(dateStr);
        if (isNaN(d.getTime())) return "";
        const today = new Date();
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);

        if (d.toDateString() === today.toDateString()) return "Today";
        if (d.toDateString() === yesterday.toDateString()) return "Yesterday";
        return d.toLocaleDateString([], { month: "short", day: "numeric", year: "numeric" });
    }

    function shouldShowDateHeader(dateStr) {
        const date = formatDate(dateStr);
        if (date !== lastDateHeader) {
            lastDateHeader = date;
            return true;
        }
        return false;
    }

    function isImage(fileUrl) {
        return /\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(fileUrl || "");
    }

    function sanitize(text) {
        const div = document.createElement("div");
        div.textContent = text || "";
        return div.innerHTML;
    }

    function removeMessageById(messageId) {
        const row = chatBody.querySelector(`[data-message-id="${messageId}"]`);
        if (row) row.remove();
        renderedMessageIds.delete(Number(messageId));
    }

    function initReply(message) {
        replyToState = {
            id: message.id,
            author: message.senderName || "User",
            content: message.message || (message.fileName ? `Attachment: ${message.fileName}` : "Message")
        };
        replyAuthor.textContent = replyToState.author;
        replySnippet.textContent = replyToState.content.slice(0, 60);
        replyPreview.style.display = "flex";
        messageInput.focus();
    }

    function renderMessage(m) {
        if (!m || !m.id) return;
        if (renderedMessageIds.has(m.id)) return;
        renderedMessageIds.add(m.id);

        const createdAt = m.createdAt || new Date().toISOString();
        if (shouldShowDateHeader(createdAt)) {
            const dateHeader = document.createElement("div");
            dateHeader.className = "date-header";
            dateHeader.innerHTML = `<span>${formatDate(createdAt)}</span>`;
            chatBody.appendChild(dateHeader);
        }

        const isMine = Number(m.senderId) === Number(currentUser.id);
        const wrapper = document.createElement("div");
        wrapper.className = `msg-row ${isMine ? "right" : "left"}`;
        wrapper.dataset.messageId = String(m.id);

        const bubble = document.createElement("div");
        bubble.className = "msg-bubble";

        const actions = document.createElement("div");
        actions.className = "msg-actions";

        const replyBtn = document.createElement("button");
        replyBtn.className = "action-btn";
        replyBtn.textContent = "Reply";
        replyBtn.onclick = () => initReply(m);
        actions.appendChild(replyBtn);

        if (isMine) {
            const deleteBtn = document.createElement("button");
            deleteBtn.className = "action-btn";
            deleteBtn.textContent = "Delete";
            deleteBtn.onclick = () => deleteMessage(m.id);
            actions.appendChild(deleteBtn);
        }

        bubble.appendChild(actions);

        if (!isMine && m.senderName) {
            const sender = document.createElement("div");
            sender.className = "msg-sender";
            sender.textContent = m.senderName;
            bubble.appendChild(sender);
        }

        if (m.replyToId) {
            const quote = document.createElement("div");
            quote.className = "quote-block";
            quote.innerHTML = `<div class="quote-author">↩ ${sanitize(m.replyToAuthor || "Message")}</div><div>${sanitize((m.replyToContent || "").slice(0, 80))}</div>`;
            bubble.appendChild(quote);
        }

        if (m.message) {
            const text = document.createElement("div");
            text.className = "msg-text";
            text.textContent = m.message;
            bubble.appendChild(text);
        }

        if (m.fileUrl) {
            const fileLink = document.createElement("a");
            fileLink.href = m.fileUrl;
            fileLink.target = "_blank";
            fileLink.className = "msg-file";
            fileLink.textContent = `${isImage(m.fileUrl) ? "🖼" : "📎"} ${m.fileName || "Attachment"}`;
            bubble.appendChild(fileLink);

            if (isImage(m.fileUrl)) {
                const img = document.createElement("img");
                img.className = "msg-image";
                img.src = m.fileUrl;
                img.alt = "attachment";
                bubble.appendChild(img);
            }
        }

        const meta = document.createElement("div");
        meta.className = "msg-meta";
        const time = document.createElement("div");
        time.className = "msg-time";
        time.textContent = formatFullDateTime(createdAt);
        meta.appendChild(time);
        bubble.appendChild(meta);

        wrapper.appendChild(bubble);
        chatBody.appendChild(wrapper);
        chatBody.scrollTop = chatBody.scrollHeight;
    }

    function connectWebSocket() {
        const socket = new SockJS("/ws");
        stompClient = Stomp.over(socket);

        stompClient.connect({}, () => {
            stompClient.subscribe(`/topic/chat/${requestId}`, (msg) => {
                const payload = JSON.parse(msg.body);
                if (payload.eventType === "DELETE") {
                    removeMessageById(payload.id);
                    return;
                }
                renderMessage(payload);
            });
        }, () => {
            setTimeout(connectWebSocket, 4000);
        });
    }

    async function sendMessage() {
        const text = messageInput.value.trim();
        const hasFile = fileInput.files && fileInput.files.length > 0;
        if (!text && !hasFile) return;

        if (hasFile) {
            const fd = new FormData();
            fd.append("senderId", currentUser.id);
            fd.append("senderRole", currentUser.role || "");
            fd.append("message", text);
            if (replyToState) {
                fd.append("replyToId", replyToState.id);
                fd.append("replyToAuthor", replyToState.author);
                fd.append("replyToContent", replyToState.content);
            }
            fd.append("file", fileInput.files[0]);

            try {
                const res = await fetch(`${API}/chat/${requestId}/upload`, {
                    method: "POST",
                    body: fd
                });
                if (!res.ok) throw new Error("upload failed");
                const saved = await res.json();
                renderMessage(saved);
                messageInput.value = "";
                clearSelectedFile();
                clearReplyState();
            } catch (e) {
                console.error(e);
                alert("Failed to send attachment");
            }
            return;
        }

        if (!stompClient?.connected) return;
        const message = {
            senderId: currentUser.id,
            senderRole: currentUser.role,
            message: text,
            replyToId: replyToState ? replyToState.id : null,
            replyToAuthor: replyToState ? replyToState.author : null,
            replyToContent: replyToState ? replyToState.content : null
        };
        stompClient.send(`/app/chat.send/${requestId}`, {}, JSON.stringify(message));
        messageInput.value = "";
        clearReplyState();
    }

    async function deleteMessage(messageId) {
        try {
            const res = await fetch(`${API}/chat/message/${messageId}?userId=${encodeURIComponent(currentUser.id)}`, {
                method: "DELETE"
            });
            if (!res.ok) {
                const err = await res.text();
                throw new Error(err || "Delete failed");
            }
            removeMessageById(messageId);
        } catch (e) {
            console.error(e);
            alert("Unable to delete message");
        }
    }

    messageInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    fetch(`${API}/chat/${requestId}`)
        .then((res) => res.json())
        .then((messages) => {
            chatBody.innerHTML = "";
            lastDateHeader = "";
            messages.forEach(renderMessage);
            chatBody.scrollTop = chatBody.scrollHeight;
        })
        .catch(() => {
            chatBody.innerHTML = '<div class="loading">Failed to load messages</div>';
        });

    connectWebSocket();

    // Clear unread chat notifications for this conversation once opened
    fetch(`${API}/notifications/${currentUser.id}/seen-by-type?type=CHAT&requestId=${encodeURIComponent(requestId)}`, {
        method: "PUT"
    }).catch(() => {});
</script>

</body>
</html>
