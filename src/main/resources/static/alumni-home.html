<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Campus Connect — Alumni Home</title>

    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        .alumni-home {
          display: flex;
          justify-content: center;
          gap: 40px;
          margin-top: 60px;
          flex-wrap: wrap;
        }

        .home-card {
          width: 320px;
          background: #fff;
          padding: 30px;
          border-radius: 18px;
          text-align: center;
          box-shadow: 0 15px 40px rgba(0,0,0,0.12);
          cursor: pointer;
        }

        body.dark-theme .home-card {
          background: #1f1f1f;
        }

        .home-card h3 {
          margin: 15px 0 10px;
        }

        .home-card p {
          color: #6c757d;
        }

        body.dark-theme .home-card p {
          color: #bdbdbd;
        }

        .home-btn {
          margin-top: 18px;
          width: 100%;
          padding: 12px;
          border-radius: 10px;
          border: none;
          cursor: pointer;
          font-weight: 600;
          background: linear-gradient(90deg,#6a5cff,#3b82f6);
          color: #fff;
        }
    </style>
</head>

<body>

<header class="app-header">
    <h1>🎓 Alumni Home</h1>
    <div class="header-actions">
        <button class="header-btn" onclick="logout()">🚪 Logout</button>
        <button class="header-btn" id="themeToggle">🌙 Light Mode</button>
    </div>
</header>

<main class="container">
    <h2 style="text-align:center;margin-top:30px;">Welcome Alumni</h2>

    <div class="alumni-home">

        <!-- CREATE PROFILE -->
        <div class="home-card" onclick="goCreate()">
            <div style="font-size:42px;">📝</div>
            <h3>Create Alumni Profile</h3>
            <p>Create or update your mentor profile.</p>
            <button class="home-btn">Create Profile</button>
        </div>

        <!-- ✅ CHATS (WHATSAPP STYLE) -->
        <div class="home-card" onclick="goChats()">
            <div style="font-size:42px;">💬</div>
            <h3>Chats</h3>
            <p>Chat with accepted students</p>
            <button class="home-btn">Open Chats</button>
        </div>

    </div>
</main>

<footer class="footer">
    <p>© 2025 Campus Connect | Alumni</p>
</footer>

<script>
    const session = JSON.parse(localStorage.getItem("user"));
    if (!session || !session.data) {
      alert("Please login first");
      window.location.href = "login.html";
    }

    function goCreate() {
      window.location.href = "alumni-onboarding.html";
    }

    // ✅ SAME FLOW AS STUDENT
    function goChats() {
      window.location.href = "recent-chats.html";
    }

    function logout() {
      localStorage.clear();
      window.location.href = "login.html";
    }

    // theme
    const toggleBtn = document.getElementById("themeToggle");
    if (localStorage.getItem("darkTheme") === "true") {
      document.body.classList.add("dark-theme");
    }

    toggleBtn.onclick = () => {
      document.body.classList.toggle("dark-theme");
      localStorage.setItem("darkTheme",
        document.body.classList.contains("dark-theme"));
    };
</script>

</body>
</html>
