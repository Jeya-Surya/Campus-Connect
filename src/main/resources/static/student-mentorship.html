<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Campus Connect — Student Mentorship</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        .mentor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .mentor-card {
            background: #ffffff;
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .mentor-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 25px 45px rgba(0,0,0,0.15);
        }

        body.dark-theme .mentor-card {
            background: #1f1f1f;
        }

        .mentor-name {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .mentor-info p {
            margin: 6px 0;
            font-size: 0.95rem;
            color: #6c757d;
        }

        body.dark-theme .mentor-info p {
            color: #cfcfcf;
        }

        .mentor-actions {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .mentor-actions select,
        .mentor-actions textarea {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-family: inherit;
        }

        body.dark-theme .mentor-actions select,
        body.dark-theme .mentor-actions textarea {
            background: #2a2a2a;
            color: #fff;
            border-color: #444;
        }

        .mentor-actions button {
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(90deg,#6a5cff,#3b82f6);
            color: #fff;
        }

        .mentor-actions button:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

<header class="app-header">
    <h1>🎯 Student Mentorship</h1>
    <div class="header-actions">
        <button class="header-btn" onclick="goHome()">🏠 Home</button>
        <button class="header-btn" onclick="logout()">🚪 Logout</button>
        <button class="header-btn" id="themeToggle">🌙 Dark Mode</button>
    </div>
</header>

<main class="container">

    <h2 style="text-align:center;margin:30px 0;">
        Available Alumni Mentors
    </h2>

    <div id="alumniList" class="mentor-grid"></div>

</main>

<footer class="footer">
    <p>© 2025 Campus Connect | Student Mentorship</p>
</footer>

<script>
    const API = "http://localhost:8080/api";

    // 🔐 SESSION CHECK
    const session = JSON.parse(localStorage.getItem("user"));
    if (!session || !session.data) {
        alert("Please login first");
        window.location.href = "login.html";
    }

    // 🌙 THEME
    const toggleBtn = document.getElementById("themeToggle");
    if (localStorage.getItem("darkTheme") === "true") {
        document.body.classList.add("dark-theme");
    }
    toggleBtn.onclick = () => {
        document.body.classList.toggle("dark-theme");
        localStorage.setItem(
            "darkTheme",
            document.body.classList.contains("dark-theme")
        );
    };

    function goHome() {
        window.location.href = "student-home.html";
    }

    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }

    // ================= LOAD ALUMNI =================
    fetch(`${API}/alumni`)
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById("alumniList");
            list.innerHTML = "";

            if (!data || data.length === 0) {
                list.innerHTML = "<p>No alumni available</p>";
                return;
            }

            data.forEach(a => {
                const card = document.createElement("div");
                card.className = "mentor-card";

                card.innerHTML = `
                    <div class="mentor-name">${a.name}</div>

                    <div class="mentor-info">
                        <p>🎓 ${a.dept} (${a.gradYear})</p>
                        <p>💼 ${a.company} – ${a.role}</p>
                        <p>📍 ${a.location}</p>
                        <p>🌟 ${a.helpAreas}</p>
                    </div>

                    <div class="mentor-actions">
                        <select id="cat-${a.userId}">
                            <option value="">Select Category</option>
                            <option value="Career">Career Guidance</option>
                            <option value="Internship">Internship</option>
                            <option value="Referral">Referral</option>
                            <option value="Higher Studies">Higher Studies</option>
                        </select>

                        <textarea
                            id="msg-${a.userId}"
                            rows="3"
                            placeholder="Write your message to the mentor"></textarea>

                        <button onclick="sendRequest(${a.userId})">
                            🤝 Request Mentorship
                        </button>
                    </div>
                `;

                list.appendChild(card);
            });
        });

    // ================= SEND REQUEST =================
    function sendRequest(alumniUserId) {
        const message = document.getElementById(`msg-${alumniUserId}`).value.trim();
        const category = document.getElementById(`cat-${alumniUserId}`).value;

        if (!category) {
            alert("Please select a category");
            return;
        }

        if (!message) {
            alert("Please enter a message");
            return;
        }

        fetch(
            `${API}/mentorship/send/${alumniUserId}` +
            `?studentName=${encodeURIComponent(session.data.name)}` +
            `&studentEmail=${encodeURIComponent(session.data.email)}` +
            `&message=${encodeURIComponent(message)}` +
            `&category=${encodeURIComponent(category)}`,
            { method: "POST" }
        )
        .then(() => alert("✅ Mentorship request sent"))
        .catch(() => alert("❌ Failed to send request"));
    }
</script>
<script>
    (() => {
      const api = "http://localhost:8080/api";
      const sessionData = JSON.parse(localStorage.getItem("user"));

      if (!sessionData || !sessionData.data) {
        return;
      }

      function loadMyMentorshipRequests() {
        const email = sessionData.data.email;

        fetch(`${api}/mentorship/student/requests?email=${encodeURIComponent(email)}`)
          .then(res => {
            if (!res.ok) {
              throw new Error("Failed to fetch student requests");
            }
            return res.json();
          })
          .then(data => {
            console.log("Student mentorship requests:", data);
          })
          .catch(err => {
            console.error(err);
          });
      }

      loadMyMentorshipRequests();
    })();
</script>


</body>
</html>
